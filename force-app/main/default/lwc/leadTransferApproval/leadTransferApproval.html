<template>

    <!-- MODAL HEADER -->
    <lightning-modal-header label="Lead Transfer Request"></lightning-modal-header>

    <!-- MODAL BODY -->
    <lightning-modal-body>
        <div class="slds-p-around_medium">
            <template if:true={showAccessDenied}>
                <div class="slds-text-color_error slds-m-bottom_small">
                    {accessMessage}
                </div>
            </template>

            <template if:true={isSameOwner}>
                <div class="slds-text-color_error slds-m-bottom_small">
                    You cannot transfer this lead because you are the current owner of the candidate.
                </div>
            </template>

            <template if:true={hasPendingRequest}>
                <div class="slds-text-color_error slds-m-bottom_small">
                    {pendingMessage}
                </div>
            </template>

            <template if:true={showCommentBox}>
                <lightning-textarea 
                    label=" Comments"
                    value={comments}
                    onchange={handleCommentChange}
                    required>
                </lightning-textarea>
            </template>

        </div>
    </lightning-modal-body>

    <!-- MODAL FOOTER -->
    <lightning-modal-footer>
<div class="footer">
        <lightning-button 
            label="Cancel"
            onclick={handleCancel}>
        </lightning-button>

        <lightning-button 
            label="send"
            variant="brand"
            onclick={handleSubmit}
            disabled={isSubmitDisabled}>
        </lightning-button>
</div>
    </lightning-modal-footer>

</template>

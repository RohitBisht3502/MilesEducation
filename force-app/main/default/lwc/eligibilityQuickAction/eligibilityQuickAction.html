<template>
    <lightning-quick-action-panel header="Enable Eligibility Check">
        <div class="slds-is-relative">
            <!-- Spinner placed inside the relative container to ensure it overlays the content -->
            <template if:true={isProcessing}>
                <lightning-spinner alternative-text="Loading" size="large" variant="brand">
                </lightning-spinner>
            </template>

            <div class="slds-var-p-around_medium" style="min-height: 120px;">
                <p>
                    This will create the eligibility folder structure for this Lead
                    and enable document-based eligibility checks.
                </p>
                <p class="slds-m-top_small">
                    Do you want to proceed?
                </p>
            </div>
        </div>

        <div slot="footer">
            <lightning-button variant="neutral" label="Cancel" onclick={handleCancel} disabled={isProcessing}>
            </lightning-button>

            <lightning-button class="slds-m-left_small" variant="brand" label="Confirm" onclick={handleConfirm}
                disabled={isConfirmDisabled}>
            </lightning-button>
        </div>
    </lightning-quick-action-panel>
</template>

<template>
    <template if:true={mainLead}>
        <lightning-card title="Lead Merge Approval Details">
            <div class="slds-p-horizontal_medium slds-p-bottom_medium">
                <div class="slds-grid slds-wrap slds-gutters">

                    <!-- Main Lead Column -->
                    <div class="slds-col slds-size_1-of-2 border-right">
                        <div class="slds-text-heading_small slds-m-bottom_small slds-text-color_weak">Main Lead
                            (Destination)</div>
                        <lightning-record-view-form record-id={mainLead.Id} object-api-name="Lead__c">
                            <lightning-output-field field-name="Name"></lightning-output-field>
                            <lightning-output-field field-name="CAN_ID__c"></lightning-output-field>
                            <lightning-output-field field-name="Course__c"></lightning-output-field>
                            <lightning-output-field field-name="Stage__c"></lightning-output-field>
                            <lightning-output-field field-name="Status__c"></lightning-output-field>
                            <lightning-output-field field-name="OwnerId"></lightning-output-field>
                            <lightning-output-field field-name="Lead_Merge_Comments__c"></lightning-output-field>
                        </lightning-record-view-form>
                    </div>

                    <!-- Merged Lead Column -->
                    <div class="slds-col slds-size_1-of-2">
                        <template if:true={mergedLead}>
                            <div class="slds-text-heading_small slds-m-bottom_small slds-text-color_error">Merging Lead
                                (Source)</div>
                            <lightning-record-view-form record-id={mergedLead.Id} object-api-name="Lead__c">
                                <lightning-output-field field-name="Name"></lightning-output-field>
                                <lightning-output-field field-name="CAN_ID__c"></lightning-output-field>
                                <lightning-output-field field-name="Course__c"></lightning-output-field>
                                <lightning-output-field field-name="Stage__c"></lightning-output-field>
                                <lightning-output-field field-name="Status__c"></lightning-output-field>
                                <lightning-output-field field-name="OwnerId"></lightning-output-field>
                            </lightning-record-view-form>
                        </template>
                        <template if:false={mergedLead}>
                            <div class="slds-align_absolute-center slds-m-top_large">
                                <p class="slds-text-color_weak">No merging lead detail found.</p>
                            </div>
                        </template>
                    </div>

                </div>
            </div>
        </lightning-card>
    </template>

    <template if:false={mainLead}>
        <lightning-card title="Approval Details">
            <div class="slds-p-horizontal_medium slds-p-bottom_medium">
                No related Lead__c found or this record is not part of a merge process.
            </div>
        </lightning-card>
    </template>
</template>

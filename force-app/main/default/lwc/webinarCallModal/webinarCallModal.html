<template>
    <lightning-quick-action-panel class="panel-wrapper">

        <!-- ===== HEADER ===== -->
        <div class="custom-header">
            <div class="header-left">
                <lightning-icon icon-name="utility:call" size="small"></lightning-icon>
                <span class="header-title">{callTitle}</span>
            </div>

            <div class="header-right">
                <span class="status-pill">{callStatus}</span>
                <span class="duration">
                    <lightning-icon icon-name="utility:clock" size="x-small"></lightning-icon>
                    {elapsedLabel}
                </span>
            </div>
        </div>

        <!-- ===== LOADER ===== -->
        <template if:true={loading}>
            <div class="loading-state">
                <lightning-spinner size="small"></lightning-spinner>
                <div>Calling Runo Allocation API…</div>
            </div>
        </template>


        <!-- ===== BODY ===== -->
        <div class="body-wrapper">

            <!-- TABS -->
            <div class="tab-bar">
                <div class={leadTabClass} data-tab="lead" onclick={handleTabClick}>
                    Lead Information
                </div>
                <div class={historyTabClass} data-tab="history" onclick={handleTabClick}>
                    Call History
                </div>

                <div class={webinarTabClass} data-tab="webinar" onclick={handleTabClick}>
                    Webinar History
                </div>

                <div class={eventTabClass} data-tab="event" onclick={handleTabClick}>
                    Event History
                </div>
                <div>
                    <a onclick={handleViewMoreLead} class="view-more-link">
                        View More
                    </a>
                </div>
            </div>


            <!-- CONTENT ROW -->
            <div class="content-row two-col-layout">

                <!-- LEFT SIDE -->
                <div class="left-panel">
                    <template if:true={isLeadTab}>
                        <div class="section-card">
                            <div class="section-header">
                                <lightning-icon icon-name="standard:lead" size="small"></lightning-icon>
                                <span>Lead Information</span>
                            </div>

                            <div class="info-grid">

                                <template if:true={identity.canId}>
                                    <div class="info-tile">
                                        <lightning-icon icon-name="utility:tag"></lightning-icon>
                                        <div>
                                            <small>CAN ID:-</small>
                                            <strong>{identity.canId}</strong>
                                        </div>
                                    </div>
                                </template>
                                <div class="info-tile">
                                    <lightning-icon icon-name="utility:user"></lightning-icon>
                                    <div>
                                        <small>Name:-</small>
                                        <strong>{identity.name}</strong>
                                    </div>
                                </div>

                                <div class="info-tile">
                                    <lightning-icon icon-name="utility:location"></lightning-icon>
                                    <div>
                                        <small>Location:-</small>
                                        <strong>{identity.city}</strong>
                                    </div>
                                </div>

                                <div class="info-tile">
                                    <lightning-icon icon-name="utility:topic"></lightning-icon>
                                    <div>
                                        <small>Course:-</small>
                                        <strong>{identity.source}</strong>
                                    </div>
                                </div>

                                <div class="info-tile">
                                    <lightning-icon icon-name="utility:collection"></lightning-icon>
                                    <div>
                                        <small>Stage:-</small>
                                        <strong>{identity.stage}</strong>
                                    </div>
                                </div>

                                <div class="info-tile">
                                    <lightning-icon icon-name="utility:event"></lightning-icon>
                                    <div>
                                        <small>Created Date:-</small>
                                        <strong>{formattedCreatedDate}</strong>
                                    </div>
                                </div>

                                <div class="info-tile">
                                    <lightning-icon icon-name="utility:user_role"></lightning-icon>
                                    <div>
                                        <small>Lead Owner:-</small>
                                        <strong>{identity.leadOwner}</strong>
                                    </div>
                                </div>
                            </div>
                            <template if:true={showPopup}>
                                <div class="call-popup">Call Successfully sent</div>
                            </template>
                        </div>
                    </template>

                    <!-- CALL HISTORY -->
                    <template if:true={isHistoryTab}>
                        <div class="section-card history-card">
                            <div class="section-header">
                                <lightning-icon icon-name="utility:call" size="small"></lightning-icon>
                                <span>Call History</span>
                            </div>

                            <template if:true={hasCallHistory}>
                                <div class="call-history-list">
                                    <template for:each={callHistory} for:item="cl">
                                        <div key={cl.id} class="call-history-item">
                                            <div class="call-history-left">
                                                <div class="call-history-date">{cl.dateLabel}</div>
                                                <div class="call-history-time">{cl.timeLabel}</div>
                                            </div>
                                            <div class="call-history-right">
                                                <div class="call-history-duration">{cl.durationLabel}</div>
                                                <div class="call-history-status">{cl.status}</div>
                                            </div>
                                            <div class="call-history-meta">
                                                <span>{cl.l1}</span>
                                                <span>{cl.l2}</span>
                                                <span>{cl.stage}</span>
                                            </div>
                                        </div>
                                    </template>
                                </div>
                            </template>
                            <template if:false={hasCallHistory}>
                                <div class="call-history-empty">No call records found</div>
                            </template>
                        </div>
                    </template>

                    <!-- WEBINAR HISTORY -->
                    <template if:true={isWebinarTab}>
                        <div class="section-card history-card">
                            <div class="section-header">
                                <lightning-icon icon-name="standard:event" size="small"></lightning-icon>
                                <span>Webinar History</span>
                            </div>

                            <template if:true={webinarMembers.length}>
                                <div class="call-history-list">
                                    <template for:each={webinarMembers} for:item="wm">
                                        <div key={wm.id} class="call-history-item">
                                            <div class="call-history-left">
                                                <strong>{wm.webinar}</strong>
                                                <div class="subtle">{wm.date}</div>
                                            </div>
                                            <div class="call-history-right">
                                                <span class="badge neutral">{wm.attendance}</span>
                                            </div>
                                        </div>
                                    </template>
                                </div>
                            </template>
                            <template if:false={webinarMembers.length}>
                                <div class="call-history-empty">No webinar records found</div>
                            </template>
                        </div>
                    </template>

                    <!-- EVENT HISTORY -->
                    <template if:true={isEventTab}>
                        <div class="section-card history-card">
                            <div class="section-header">
                                <lightning-icon icon-name="standard:event" size="small"></lightning-icon>
                                <span>Event History</span>
                            </div>

                            <div class="call-history-list">
                                <template for:each={eventHistory} for:item="evt">
                                    <div key={evt.id} class="call-history-item">
                                        <div class="call-history-left">
                                            <strong>{evt.subject}</strong>
                                        </div>
                                        <div class="call-history-right">
                                            <span class="badge neutral">{evt.attendance}</span>
                                        </div>
                                    </div>
                                </template>
                            </div>
                        </div>
                    </template>
                </div>

                <!-- RIGHT SIDE (FEEDBACK) -->
                <div class="right-panel">
                    <template if:true={showFeedback}>
                        <div class="section-card">
                            <div class="section-header">
                                <lightning-icon icon-name="utility:feedback" size="small"></lightning-icon>
                                <span>Call Feedback</span>
                            </div>

                            <div class="feedback-grid">
                                <!-- Status Line -->
                                <div class="slds-grid slds-wrap slds-gutters">
                                    <div class="slds-col slds-size_1-of-2">
                                        <lightning-combobox label="Call Status (L1)" value={l1Value} options={l1Options}
                                            onchange={handleL1Change}>
                                        </lightning-combobox>
                                    </div>
                                    <div class="slds-col slds-size_1-of-2">
                                        <lightning-combobox label="Sub Status (L2)" value={l2Value} options={l2Options}
                                            onchange={handleL2Change} disabled={isL2Disabled}>
                                        </lightning-combobox>
                                    </div>
                                </div>

                                <!-- Stage Line -->
                                <div class="slds-grid slds-wrap slds-gutters slds-m-top_x-small">
                                    <div class="slds-col slds-size_1-of-2">
                                        <lightning-combobox label="Stage" value={stageValue} options={stageOptions}
                                            onchange={handleStageChange} disabled={isStageDisabled}>
                                        </lightning-combobox>
                                        <template if:true={isStageDisabled}>
                                            <div class="slds-text-color_weak slds-m-top_xx-small"
                                                style="font-size: 10px;">
                                                Stage not applicable for Not-Connected calls
                                            </div>
                                        </template>
                                    </div>
                                    <div class="slds-col slds-size_1-of-2">
                                        <lightning-input type="date" label="Expected Date" value={expectedPaymentDate}
                                            onchange={handleExpectedDateChange} disabled={isDndSpamDisabled}>
                                        </lightning-input>
                                    </div>
                                </div>

                                <!-- Followup Line -->
                                <div class="slds-grid slds-wrap slds-gutters slds-m-top_x-small">
                                    <div class="slds-col slds-size_2-of-3">
                                        <lightning-input type="datetime-local" label="Next Follow Up"
                                            value={nextFollowUpDate} onchange={handleNextFollowUpDateChange}
                                            disabled={autoSetFollowUp}>
                                        </lightning-input>
                                    </div>
                                    <div class="slds-col slds-size_1-of-3 slds-align-bottom">
                                        <lightning-input type="checkbox" label="Auto set (+24 hrs)"
                                            checked={autoSetFollowUp} onchange={handleAutoSetChange}>
                                        </lightning-input>
                                    </div>
                                </div>

                                <!-- DND/Spam Inline Row -->
                                <div class="slds-grid slds-m-top_small slds-p-around_x-small checkbox-section">
                                    <div class="slds-col">
                                        <lightning-input type="checkbox" label="Notify me" checked={notifyMe}
                                            onchange={handleNotifyChange} disabled={isDndSpamDisabled}>
                                        </lightning-input>
                                    </div>
                                    <div class="slds-col">
                                        <lightning-input type="checkbox" label="DND" checked={isDnd}
                                            onchange={handleDndChange} disabled={isDndSpamDisabled}>
                                        </lightning-input>
                                    </div>
                                    <div class="slds-col">
                                        <lightning-input type="checkbox" label="Is Spam" checked={isSpam}
                                            onchange={handleSpamChange} disabled={isDndSpamDisabled}>
                                        </lightning-input>
                                    </div>
                                </div>

                                <!-- Feedback Comments -->
                                <div class="slds-m-top_x-small">
                                    <lightning-textarea label="Comments" value={feedback} required={isCommentMandatory}
                                        onchange={handleFeedbackChange} rows="3">
                                    </lightning-textarea>
                                </div>

                                <div class="slds-m-top_medium slds-text-align_right">
                                    <lightning-button variant="brand" label="Save Feedback" onclick={handleSaveFeedback}
                                        disabled={isSaveDisabled}>
                                    </lightning-button>
                                </div>
                            </div>
                        </div>
                    </template>
                </div>
            </div>
        </div>

        <!-- ===== FOOTER ===== -->
        <div slot="footer" class="footer-actions">
            <template if:false={showFeedback}>
                <lightning-button variant="brand" label={callButtonLabel} onclick={handleCall}
                    disabled={callButtonDisabled}>
                </lightning-button>
            </template>
        </div>

    </lightning-quick-action-panel>
</template>

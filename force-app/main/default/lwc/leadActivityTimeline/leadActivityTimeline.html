<template>
    <lightning-card title="Lead Activity Timeline" icon-name="standard:lead">
        <template if:true={loading}>
            <div class="center">
                <lightning-spinner alternative-text="Loading" size="small"></lightning-spinner>
            </div>
        </template>

        <template if:true={lead}>
            <div class="timeline-shell">
                <div class="summary-grid">
                    <template for:each={summaryCards} for:item="card">
                        <div key={card.key} class="summary-card">
                            <div class={card.className}>
                                <lightning-icon icon-name={card.icon} size="x-small"></lightning-icon>
                            </div>
                            <div class="summary-copy">
                                <div class="summary-label">{card.label}</div>
                                <div class="summary-value">{card.value}</div>
                            </div>
                        </div>
                    </template>
                </div>

                <div class="filters-row">
                    <span class="filter-icon-wrap">
                        <lightning-icon icon-name="utility:filterList" size="x-small"></lightning-icon>
                    </span>
                    <template for:each={filterOptions} for:item="filter">
                        <button key={filter.label} class={filter.className} data-filter={filter.label} onclick={handleFilterClick}>
                            {filter.label}
                        </button>
                    </template>
                </div>

                <template if:true={hasActivities}>
                    <div class="activity-list">
                        <template for:each={filteredActivities} for:item="act">
                            <article key={act.id} class="activity-card">
                                <div class="activity-head">
                                    <div class="activity-title-wrap">
                                        <div class={act.iconClass}>
                                            <lightning-icon icon-name={act.iconName} size="x-small"></lightning-icon>
                                        </div>
                                        <div>
                                            <div class="activity-title">{act.name}</div>
                                            <div class="activity-subtitle">Category • {act.categoryLabel}</div>
                                        </div>
                                    </div>
                                    <div class="activity-time">{act.formattedChangedDateTime}</div>
                                </div>

                                <div class="activity-body">
                                    <div class="activity-description">{act.description}</div>

                                    <template if:true={act.isLevelChange}>
                                        <div class="detail-grid">
                                            <div class="detail-item">
                                                <span class="detail-label">Level Change:</span>
                                                <span class="detail-value">{act.previousLevel} &gt; {act.newLevel}</span>
                                            </div>
                                        </div>
                                    </template>

                                    <template if:true={act.hasOwnerFields}>
                                        <div class="detail-grid">
                                            <template if:true={act.previousOwnerName}>
                                                <div class="detail-item">
                                                    <span class="detail-label">Previous Owner:</span>
                                                    <span class="detail-value">{act.previousOwnerName}</span>
                                                </div>
                                            </template>
                                            <template if:true={act.newOwnerName}>
                                                <div class="detail-item">
                                                    <span class="detail-label">New Owner:</span>
                                                    <span class="detail-value">{act.newOwnerName}</span>
                                                </div>
                                            </template>
                                        </div>
                                    </template>

                                    <template if:true={act.isLoan}>
                                        <div class="detail-grid">
                                            <template if:true={act.loanProvider}>
                                                <div class="detail-item">
                                                    <span class="detail-label">Provider:</span>
                                                    <span class="detail-value">{act.loanProvider}</span>
                                                </div>
                                            </template>
                                            <template if:true={act.milesLoanCode}>
                                                <div class="detail-item">
                                                    <span class="detail-label">Miles Loan Code:</span>
                                                    <span class="detail-value">{act.milesLoanCode}</span>
                                                </div>
                                            </template>
                                            <template if:true={act.loanAmount}>
                                                <div class="detail-item">
                                                    <span class="detail-label">Amount:</span>
                                                    <span class="detail-value">{act.loanAmount}</span>
                                                </div>
                                            </template>
                                            <template if:true={act.loanStatus}>
                                                <div class="detail-item">
                                                    <span class="detail-label">Status:</span>
                                                    <span class="detail-value">{act.loanStatus}</span>
                                                </div>
                                            </template>
                                        </div>
                                    </template>

                                    <template if:true={act.isPayment}>
                                        <div class="detail-grid">
                                            <template if:true={act.transactionAmount}>
                                                <div class="detail-item">
                                                    <span class="detail-label">Amount:</span>
                                                    <span class="detail-value">{act.transactionAmount}</span>
                                                </div>
                                            </template>
                                            <template if:true={act.transactionStatus}>
                                                <div class="detail-item">
                                                    <span class="detail-label">Status:</span>
                                                    <span class="detail-value">{act.transactionStatus}</span>
                                                </div>
                                            </template>
                                        </div>
                                    </template>

                                    <template if:true={act.isCall}>
                                        <div class="detail-grid">
                                            <div class="detail-item">
                                                <span class="detail-label">Call Duration:</span>
                                                <span class="detail-value">{act.formattedDuration}</span>
                                            </div>
                                        </div>
                                        <div class="tag-row">
                                            <template if:true={act.l1}>
                                                <span class="tag-pill">L1: {act.l1}</span>
                                            </template>
                                            <template if:true={act.l2}>
                                                <span class="tag-pill">L2: {act.l2}</span>
                                            </template>
                                        </div>
                                    </template>

                                    <template if:true={act.efStatus}>
                                        <div class="detail-grid">
                                            <div class="detail-item">
                                                <span class="detail-label">EF Status:</span>
                                                <span class="detail-value">{act.efStatus}</span>
                                            </div>
                                        </div>
                                    </template>
                                </div>

                                <div class="activity-footer">Action Performed By: {act.actionByDisplay}</div>
                            </article>
                        </template>
                    </div>
                </template>

                <template if:false={hasActivities}>
                    <div class="no-data">No activity logs found for this lead.</div>
                </template>
            </div>
        </template>

        <template if:true={error}>
            <div class="error">Error loading activity data.</div>
        </template>
    </lightning-card>
</template>

<template>
    <div class="container">
        <div class="header">
            <div>
                <h2 class="title">Candidate Merge</h2>
                <p class="subtitle">Search candidates, review related program details, and submit the merge request.</p>
            </div>
        </div>

        <template if:true={hasPendingMergeProcess}>
            <div class="access-card">
                <div class="access-title">Merge Not Available</div>
                <div class="access-text">{pendingMergeMessage}</div>
            </div>
        </template>

        <template if:false={hasPendingMergeProcess}>
                <div class="search-container">
                    <div class="search-box">
                        <svg class="search-icon" viewBox="0 0 20 20" fill="none">
                            <path
                                d="M9 17A8 8 0 1 0 9 1a8 8 0 0 0 0 16zM16.5 16.5l-3-3"
                                stroke="currentColor"
                                stroke-width="1.5"
                                stroke-linecap="round"
                            ></path>
                        </svg>
                        <input
                            type="text"
                            value={searchKey}
                            oninput={handleChange}
                            placeholder="Search by name, email, phone or candidate ID"
                            class="search-input"
                        />
                    </div>
                    <button onclick={handleSearch} class="btn-search">Search</button>
                </div>

                <div class="results-area">
                    <template if:true={isLoading}>
                        <div class="spinner-wrap">
                            <lightning-spinner alternative-text="Loading" size="medium"></lightning-spinner>
                        </div>
                    </template>

                    <template if:true={hasMainLead}>
                        <section class="section">
                            <div class="section-header">
                                <h3 class="section-title">Current Candidate</h3>
                                <span class="master-pill">Master</span>
                            </div>

                            <div class="table-card">
                                <div class="table-head current-lead-head">
                                    <div class="col-candidate">Candidate</div>
                                    <div class="col-program">Program / Level</div>
                                    <div class="col-spoc">Spoc</div>
                                </div>

                                <template if:true={mainLeadView}>
                                    <div class="data-row current-lead-row">
                                        <div class="col-candidate candidate-cell">
                                            <div class="avatar">{mainLeadView.initials}</div>
                                            <div class="candidate-meta">
                                                <a class="candidate-name candidate-link" href={mainLeadView.candidateUrl} target="_blank">{mainLeadView.Name}</a>
                                                <div class="candidate-email">{mainLeadView.Candidate_ID__c}</div>
                                            </div>
                                        </div>

                                        <div class="col-program program-cell">
                                            <template if:true={mainLeadView.hasPrograms}>
                                                <template for:each={mainLeadView.programLevels} for:item="program">
                                                    <span key={program} class="program-pill">{program}</span>
                                                </template>
                                            </template>
                                            <template if:false={mainLeadView.hasPrograms}>
                                                <span class="muted-text">--</span>
                                            </template>
                                        </div>

                                        <div class="col-spoc">{mainLeadView.spocName}</div>
                                    </div>
                                </template>
                            </div>
                        </section>
                    </template>

                    <template if:true={showSearchResults}>
                        <section class="section">
                            <div class="section-header">
                                <h3 class="section-title">Search Results</h3>
                                <span class="result-count">{resultCount}</span>
                            </div>

                            <div class="table-card">
                                <div class="table-head search-results-head">
                                    <div class="col-select"></div>
                                    <div class="col-candidate">Candidate</div>
                                    <div class="col-program">Program / Level</div>
                                    <div class="col-spoc">Spoc</div>
                                </div>

                                <template for:each={leads} for:item="lead">
                                    <div key={lead.Id} class={lead.rowClass}>
                                        <div class="col-select select-cell">
                                            <button
                                                class={lead.checkboxClass}
                                                data-id={lead.Id}
                                                onclick={handleSelectLead}
                                                title="Select candidate"
                                            >
                                                <span class="check-mark">&#10003;</span>
                                            </button>
                                        </div>

                                        <div class="col-candidate candidate-cell">
                                            <div class="avatar">{lead.initials}</div>
                                            <div class="candidate-meta">
                                                <a class="candidate-name candidate-link" href={lead.candidateUrl} target="_blank">{lead.Name}</a>
                                                <div class="candidate-email">{lead.Candidate_ID__c}</div>
                                            </div>
                                        </div>

                                        <div class="col-program program-cell">
                                            <template if:true={lead.hasPrograms}>
                                                <template for:each={lead.programLevels} for:item="program">
                                                    <span key={program} class="program-pill">{program}</span>
                                                </template>
                                            </template>
                                            <template if:false={lead.hasPrograms}>
                                                <span class="muted-text">--</span>
                                            </template>
                                        </div>

                                        <div class="col-spoc">{lead.spocName}</div>
                                    </div>
                                </template>
                            </div>
                        </section>
                    </template>

                    <template if:true={selectedLead}>
                        <section class="section form-section">
                            <label class="field-label">
                                <span class="required">*</span> Merge Comments
                            </label>
                            <lightning-textarea
                                class="comment-input-lwc"
                                label="Merge Comments"
                                variant="label-hidden"
                                placeholder="Enter reason for merging these candidates..."
                                value={mergeComments}
                                onchange={handleCommentChange}
                            ></lightning-textarea>

                            <div class="action-bar">
                                <button
                                    onclick={handleMerge}
                                    class="btn-submit"
                                    disabled={isMergeDisabled}
                                >
                                    <svg viewBox="0 0 20 20" fill="currentColor">
                                        <path
                                            d="M7.5 5.5a1 1 0 0 1 1.414 0l1.086 1.086 3.793-3.793a1 1 0 0 1 1.414 1.414L10.707 8.707a1 1 0 0 1-1.414 0L7.5 6.914A1 1 0 0 1 7.5 5.5zm0 7a1 1 0 0 1 1.414 0l1.086 1.086 3.793-3.793a1 1 0 1 1 1.414 1.414l-4.5 4.5a1 1 0 0 1-1.414 0l-1.793-1.793A1 1 0 0 1 7.5 12.5z"
                                        ></path>
                                    </svg>
                                    Submit Candidate Merge
                                </button>
                            </div>
                        </section>
                    </template>

                    <template if:false={hasAnyContent}>
                        <div class="empty-state">
                            <div class="empty-icon">
                                <svg viewBox="0 0 24 24" fill="none">
                                    <circle cx="11" cy="11" r="8" stroke="currentColor" stroke-width="2"></circle>
                                    <path d="m21 21-4.35-4.35" stroke="currentColor" stroke-width="2" stroke-linecap="round"></path>
                                </svg>
                            </div>
                            <h3 class="empty-title">No candidates found</h3>
                            <p class="empty-text">Start by searching for a candidate to merge.</p>
                        </div>
                    </template>
                </div>
        </template>
    </div>
</template>

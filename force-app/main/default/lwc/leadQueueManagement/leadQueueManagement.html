<template>
  <div class="main-layout">
    <div class="left-pane">
      <div class="sidebar-section">
        <div class="total-leads-sidebar">
          <div class="tl-icon">
            <lightning-icon icon-name="utility:groups" size="x-small"></lightning-icon>
          </div>
          <div class="tl-info">
            <span class="tl-label">Total Leads</span>
            <span class="tl-value">{totalLeads}</span>
          </div>
        </div>
      </div>

      <div class="sidebar-section queue-section">
        <div class="sidebar-section-title">Queues</div>
        <div class="queue-list">
          <template for:each={queueList} for:item="queue">
            <div
              key={queue.name}
              class={queue.itemClass}
              data-queue={queue.name}
              onclick={handleQueueSelect}>
              <div class="queue-item-left">
                <span class={queue.dotClass}></span>
                <span class="queue-item-name">{queue.name}</span>
              </div>
              <span class={queue.countClass}>{queue.count}</span>
            </div>
          </template>
        </div>
      </div>
    </div>

    <div class="right-pane">
      <div class="right-header">
        <div class="right-header-left">
          <span class="queue-title">Lead Queue</span>
          <span class="showing-count">Showing {showingCount} leads</span>
        </div>
        <div class="right-header-actions">
          <button class="btn btn-start" onclick={handleStart} disabled={disableStart}>Start</button>
          <button class="btn btn-resume" onclick={handleResume} disabled={disableResume}>Resume</button>
          <button class="btn-icon" title="Refresh" onclick={handleRefresh} disabled={isRefreshing}>
            <lightning-icon icon-name="utility:refresh" size="xx-small"></lightning-icon>
          </button>
          <template if:true={isRefreshing}>
            <div class="refresh-spinner-wrap">
              <lightning-spinner alternative-text="Refreshing" size="small"></lightning-spinner>
            </div>
          </template>
        </div>
      </div>

      <div class="table-scroll">
        <table class="data-table">
          <thead>
            <tr>
              <th>CAN ID</th>
              <th>Lead Name</th>
              <th>Queue Name</th>
              <th>Bucket</th>
              <th>Level</th>
              <th>Course</th>
              <th>In Queue Since</th>
            </tr>
          </thead>
          <tbody>
            <template if:true={hasFilteredLeads}>
              <template for:each={filteredLeads} for:item="lead">
                <tr key={lead.id}>
                  <td class="candidate-cell">{lead.candidateIdDisplay}</td>
                  <td>
                    <a
                      class="lead-link"
                      data-id={lead.id}
                      data-object={lead.recordObjectApiName}
                      onclick={handleLeadClick}>
                      {lead.name}
                    </a>
                  </td>
                  <td>
                    <span class="badge-queue">
                      <span class={lead.queueDotClass}></span>
                      {lead.queueName}
                    </span>
                  </td>
                  <td><span class={lead.bucketBadgeClass}>{lead.bucketLabel}</span></td>
                  <td><span class="badge-level">{lead.levelLabel}</span></td>
                  <td class="course-cell" title={lead.courseLabel}>{lead.courseLabel}</td>
                  <td><span class={lead.inQueueClass}>{lead.inQueueSince}</span></td>
                </tr>
              </template>
            </template>
            <template if:false={hasFilteredLeads}>
              <tr>
                <td colspan="7" class="no-data">No leads to display.</td>
              </tr>
            </template>
          </tbody>
        </table>
      </div>
    </div>

    <template if:true={showModal}>
      <div class="modal-overlay slds-backdrop slds-backdrop_open"></div>

      <section class="slds-modal slds-fade-in-open" style="display:block; background:transparent;">
        <div class="slds-modal__container runo-section" style="background:transparent;">
          <header class="slds-modal__header modal-header-compact">
            <button class="slds-button slds-button_icon slds-modal__close" onclick={closeModal}>
              <lightning-icon icon-name="utility:close" size="small"></lightning-icon>
            </button>
          </header>

          <c-runo-allocation-calls
            record-id={currentLeadId}
            is-call-log={currentIsCallLog}
            is-queue-running={queueRunning}
            is-queue-paused={isQueuePaused}
            oncallcomplete={handleCallComplete}
            onpausequeue={handlePauseFromChild}
            onresumequeue={handleResumeFromChild}>
          </c-runo-allocation-calls>
        </div>
      </section>
    </template>
  </div>
</template>

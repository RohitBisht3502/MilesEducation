<template>
    <div class="main-layout">
        <div class="left-pane">
            <div class="sidebar-section">
                <div class="total-leads-sidebar">
                    <div class="tl-icon">
                        <lightning-icon icon-name="utility:groups" size="x-small"></lightning-icon>
                    </div>
                    <div class="tl-info">
                        <span class="tl-label">Total Leads</span>
                        <span class="tl-value">{totalLeads}</span>
                    </div>
                </div>
            </div>

            <div class="sidebar-section bucket-section">
                <div class="sidebar-section-title">Bucket</div>
                <div class="bucket-list">
                    <template for:each={bucketList} for:item="bucket">
                        <div
                            key={bucket.name}
                            class={bucket.itemClass}
                            data-bucket={bucket.name}
                            onclick={handleBucketSelect}>
                            <span class="bucket-item-name">{bucket.name}</span>
                            <span class={bucket.countClass}>{bucket.count}</span>
                        </div>
                    </template>
                </div>
            </div>
        </div>

        <div class="right-pane">
            <div class="right-header">
                <div class="right-header-left">
                    <span class="queue-title">Q1 Lead Queue</span>
                    <span class="showing-count">Showing {showingCount} leads</span>
                </div>
                <div class="right-header-actions">
                    <button class="btn-icon" title="Refresh" onclick={handleRefresh} disabled={isRefreshing}>
                        <lightning-icon icon-name="utility:refresh" size="xx-small"></lightning-icon>
                    </button>
                    <template if:true={isRefreshing}>
                        <div class="refresh-spinner-wrap">
                            <lightning-spinner alternative-text="Refreshing" size="small"></lightning-spinner>
                        </div>
                    </template>
                </div>
            </div>

            <div class="table-scroll">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>CAN ID</th>
                            <th>Lead Name</th>
                            <th>Bucket</th>
                            <th>Level</th>
                            <th>Course</th>
                            <th>In Queue Since</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody>
                        <template if:true={hasFilteredLeads}>
                            <template for:each={filteredLeadGroups} for:item="group">
                                <tr key={group.key}>
                                    <td>
                                        <template if:true={group.candidateId}>
                                            <a class="lead-link" data-id={group.candidateId} onclick={handleCandidateClick}>{group.candidateIdDisplay}</a>
                                        </template>
                                        <template if:false={group.candidateId}>
                                            {group.candidateIdDisplay}
                                        </template>
                                        <span class="group-meta">({group.candidateCount} lead(s))</span>
                                    </td>
                                    <td>{group.candidateNameDisplay}</td>
                                    <td><span class={group.bucketBadgeClass}>{group.bucketDisplay}</span></td>
                                    <td><span class="badge-level">{group.levelDisplay}</span></td>
                                    <td>{group.courseDisplay}</td>
                                    <td><span class={group.inQueueClass}>{group.inQueueSince}</span></td>
                                    <td>
                                        <lightning-button
                                            label={group.buttonLabel}
                                            variant="brand"
                                            icon-name="utility:call"
                                            data-id={group.primaryLeadId}
                                            onclick={handleCall}
                                            disabled={group.isProcessing}>
                                        </lightning-button>
                                    </td>
                                </tr>
                            </template>
                        </template>
                        <template if:false={hasFilteredLeads}>
                            <tr>
                                <td colspan="7" class="no-data">No leads available in Q1 Queue.</td>
                            </tr>
                        </template>
                    </tbody>
                </table>
            </div>
        </div>

        <template if:true={showModal}>
            <div class="modal-overlay slds-backdrop slds-backdrop_open"></div>
            <section class="slds-modal slds-fade-in-open" style="display:block; background:transparent;">
                <div class="slds-modal__container runo-section" style="background:transparent;">
                    <header class="slds-modal__header modal-header-compact">
                        <button class="slds-button slds-button_icon slds-modal__close" onclick={closeModal}>
                            <lightning-icon icon-name="utility:close" size="small"></lightning-icon>
                        </button>
                    </header>

                    <c-runo-allocation-call-q1
                        record-id={currentLeadId}
                        auto-call="true"
                        oncallcomplete={handleCallComplete}
                        dispositions={dispositions.data}>
                    </c-runo-allocation-call-q1>
                </div>
            </section>
        </template>
    </div>
</template>

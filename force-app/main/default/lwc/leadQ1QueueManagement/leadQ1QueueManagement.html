<template>
    <div class="wrap">
        <div class="toolbar">
            <div class="stats-grid">
                <div class="stat-card">
                    <div>
                        <span class="stat-label">Total Q1 Leads</span>
                        <span class="stat-value">{totalLeads}</span>
                    </div>
                    <div class="stat-icon users">
                        <lightning-icon icon-name="utility:groups" size="small"></lightning-icon>
                    </div>
                </div>
            </div>

            <div class="actions">
                <lightning-button-icon class="refresh-btn" icon-name="utility:refresh" alternative-text="Refresh"
                    title="Refresh" onclick={handleRefresh} disabled={isRefreshing}>
                </lightning-button-icon>
                <template if:true={isRefreshing}>
                    <div class="refresh-spinner-wrap">
                        <lightning-spinner alternative-text="Refreshing" size="small"></lightning-spinner>
                    </div>
                </template>
            </div>
        </div>

        <div class="table-title-row">
            <h2 class="table-title">Q1 Lead Queue</h2>
            <span class="table-meta">Showing {remainingLeads} leads</span>
        </div>

        <div class="table-scroller">
            <table class="matrix">
                <thead>
                    <tr>
                        <th>S.No</th>
                        <th>Lead Name</th>
                        <th>Phone Number</th>
                        <th>Primary Tag</th>
                        <th>Bucket</th>
                        <th>Level</th>
                        <th>Course</th>
                        <th>City</th>
                        <th>Next Follow Up Date</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody>
                    <template if:true={hasLeads}>
                        <template for:each={leads} for:item="lead">
                            <tr key={lead.id}>
                                <td>{lead.rowNumber}</td>
                                <td class="name-cell">{lead.name}</td>
                                <td>{lead.phone}</td>
                                <td><span class={lead.primaryTagClass}>{lead.primaryTagLabel}</span></td>
                                <td><span class={lead.bucketClass}>{lead.bucketLabel}</span></td>
                                <td><span class={lead.levelClass}>{lead.levelLabel}</span></td>
                                <td>{lead.courseLabel}</td>
                                <td>{lead.cityLabel}</td>
                                <td>
                                    <template if:true={lead.nextFollowUpDate}>
                                        <lightning-formatted-date-time value={lead.nextFollowUpDate} year="numeric"
                                            month="2-digit" day="2-digit" hour="2-digit" minute="2-digit">
                                        </lightning-formatted-date-time>
                                    </template>
                                </td>
                                <td>
                                    <lightning-button label="Call" variant="brand" icon-name="utility:call"
                                        data-id={lead.id} onclick={handleCall}>
                                    </lightning-button>
                                </td>
                            </tr>
                        </template>
                    </template>

                    <template if:false={hasLeads}>
                        <tr>
                            <td colspan="10" class="no-data">No leads to display.</td>
                        </tr>
                    </template>
                </tbody>
            </table>
        </div>

        <!-- MODAL START -->
        <template if:true={showModal}>
            <div class="modal-overlay slds-backdrop slds-backdrop_open"></div>

            <section class="slds-modal slds-fade-in-open" style="display:block; background:transparent; ">
                <div class="slds-modal__container runo-section" style="background:transparent;">
                    <header class="slds-modal__header modal-header-compact">
                        <button class="slds-button slds-button_icon slds-modal__close" onclick={closeModal}>
                            <lightning-icon icon-name="utility:close" size="small"></lightning-icon>
                        </button>
                    </header>

                    <c-runo-allocation-calls record-id={currentLeadId} is-call-log={currentIsCallLog}
                        is-queue-running={queueRunning} oncallcomplete={handleCallComplete}>
                    </c-runo-allocation-calls>

                </div>
            </section>
        </template>
        <!-- MODAL END -->
    </div>
</template>

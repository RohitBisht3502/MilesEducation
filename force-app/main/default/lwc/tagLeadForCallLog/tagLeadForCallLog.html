<template>
    <div class="container">
        <template if:true={showConfirmation}>
            <div class="confirm-backdrop"></div>
            <div class="confirm-modal">
                <div class="confirm-shell">
                    <div class="confirm-title">{confirmationTitle}</div>
                    <div class="confirm-message">{confirmationMessage}</div>
                    <div class="confirm-actions">
                        <button class="action-btn secondary-btn" onclick={handleCancelConfirmation} disabled={isLoading}>Cancel</button>
                        <button class="action-btn primary-btn" onclick={handleConfirmStatusAction} disabled={isLoading}>Confirm</button>
                    </div>
                </div>
            </div>
        </template>

        <div class="hero-header">
            <div class="hero-avatar">
                <lightning-icon icon-name="utility:user" size="small"></lightning-icon>
            </div>
            <div class="hero-copy">
                <div class="hero-title">{customerName}</div>
                <div class="hero-phone">
                    <lightning-icon icon-name="utility:call" size="xx-small"></lightning-icon>
                    {phoneNumber}
                </div>
            </div>
        </div>

        <template if:true={showSuccess}>
            <div class="success-shell">
                <div class="success-icon-wrap">
                    <lightning-icon icon-name="utility:success" size="small"></lightning-icon>
                </div>
                <div class="success-title">{successTitle}</div>
                <div class="success-message">{successMessage}</div>
                <button class="action-btn secondary-btn success-btn" onclick={handleSuccessAction}>{successButtonLabel}</button>
            </div>
        </template>

        <template if:false={showSuccess}>
            <div class="body-section">
                <template if:true={showSearch}>
                    <div class="panel-section">
                        <div class="section-heading">Search Existing Lead</div>
                        <div class="search-row">
                            <input type="text" class="field-input" placeholder="Search by name, phone, or course" value={searchKeyword} oninput={handleSearchInput} onkeypress={handleSearchKeyPress} />
                            <button class="icon-btn" onclick={handleSearchClick} disabled={isLoading}>
                                <lightning-icon icon-name="utility:search" size="x-small"></lightning-icon>
                            </button>
                        </div>
                    </div>

                    <div class="divider"></div>

                    <div class="panel-section">
                        <div class="section-heading">Quick Actions</div>
                        <div class="quick-actions">
                            <button class="action-btn danger-btn" onclick={handleMarkSpam} disabled={isLoading}>{spamButtonLabel}</button>
                            <button class="action-btn neutral-btn" onclick={handleMarkDnd} disabled={isLoading}>{dndButtonLabel}</button>
                            <button class="action-btn primary-btn" onclick={handleCreateNew} disabled={isLoading}>New Lead</button>
                        </div>
                    </div>

                    <template if:true={isLoading}>
                        <div class="spinner-container">
                            <lightning-spinner size="small" alternative-text="Loading..."></lightning-spinner>
                        </div>
                    </template>

                    <template if:true={showLeadResults}>
                        <div class="results-list">
                            <template for:each={candidates} for:item="candidate">
                                <div key={candidate.candidateId} class="candidate-block">
                                    <div data-id={candidate.candidateId} class={candidate.cssClass} onclick={selectCandidate}>
                                        <div class="candidate-name">{candidate.candidateName}</div>
                                        <div class="candidate-meta">Owner: {candidate.ownerName}</div>
                                        <div class="candidate-meta">Courses: {candidate.courseSummary}</div>
                                    </div>
                                    <template if:true={candidate.showTagForm}>
                                        <div class="select-action-wrap">
                                            <button class="action-btn primary-btn full-btn" onclick={handleTagLead} disabled={isLoading}>{tagButtonLabel}</button>
                                        </div>
                                    </template>
                                </div>
                            </template>
                        </div>
                    </template>
                </template>

                <template if:true={showCreateForm}>
                    <div class="panel-section create-section">
                        <div class="section-heading">Create New Lead</div>

                        <div class="form-grid two-col">
                            <div class="form-field">
                                <label class="field-label">First Name</label>
                                <input type="text" class="field-input" placeholder="First name" value={formData.firstName} onchange={handleNameChange} />
                            </div>
                            <div class="form-field">
                                <label class="field-label">Last Name <span class="required">*</span></label>
                                <input type="text" class="field-input" placeholder="Last name" value={formData.lastName} onchange={handleLastNameChange} />
                            </div>
                        </div>

                        <div class="form-grid two-col">
                            <div class="form-field">
                                <label class="field-label">Email <span class="required">*</span></label>
                                <input type="email" class="field-input" placeholder="email@example.com" value={formData.email} onchange={handleEmailChange} />
                            </div>
                            <div class="form-field">
                                <label class="field-label">Phone <span class="required">*</span></label>
                                <div class="phone-grid">
                                    <div class="code-field">
                                        <select class="field-input select-input" onchange={handleCountryCodeChange}>
                                            <option value="+91">+91</option>
                                            <option value="+971">+971</option>
                                        </select>
                                    </div>
                                    <div class="phone-field">
                                        <input type="text" class="field-input" placeholder="Phone" value={formData.phone} onchange={handlePhoneChange} />
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="form-grid two-col">
                            <div class="form-field">
                                <label class="field-label">Course <span class="required">*</span></label>
                                <select class="field-input select-input" onchange={handleCourseChange}>
                                    <option value="">Select</option>
                                    <template for:each={courseOptions} for:item="option">
                                        <option key={option.value} value={option.value}>{option.label}</option>
                                    </template>
                                </select>
                            </div>
                            <div class="form-field">
                                <label class="field-label">City <span class="required">*</span></label>
                                <select class="field-input select-input" onchange={handleCityChange}>
                                    <option value="">Select</option>
                                    <template for:each={cityOptions} for:item="option">
                                        <option key={option.value} value={option.value}>{option.label}</option>
                                    </template>
                                </select>
                            </div>
                        </div>

                        <div class="form-grid two-col">
                            <div class="form-field source-field">
                                <label class="field-label">Source <span class="required">*</span></label>
                                <select class="field-input select-input" onchange={handleSourceChange}>
                                    <option value="">Select</option>
                                    <template for:each={sourceOptions} for:item="option">
                                        <option key={option.value} value={option.value}>{option.label}</option>
                                    </template>
                                </select>
                            </div>
                            <div class="form-field empty-field"></div>
                        </div>

                        <div class="footer-actions create-actions">
                            <button class="action-btn secondary-btn" onclick={handleCancel} disabled={isLoading}>Cancel</button>
                            <button class="action-btn primary-btn" onclick={handleSubmit} disabled={isLoading}>{submitButtonLabel}</button>
                        </div>
                    </div>
                </template>
            </div>
        </template>
    </div>
</template>

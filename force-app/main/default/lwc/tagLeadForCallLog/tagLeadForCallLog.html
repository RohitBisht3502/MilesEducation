<template>
    <div class="container">
        <div class="header-section">
            <div class="call-details-inline">
                <div class="user-avatar">
                    <lightning-icon icon-name="standard:avatar" size="medium"></lightning-icon>
                </div>
                <div class="user-info">
                    <h1 class="customer-name">{customerName}</h1>
                    <div class="contact-details">
                        <span class="contact-item">
                            <lightning-icon icon-name="utility:call" size="xx-small"></lightning-icon>
                            {phoneNumber}
                        </span>
                    </div>
                </div>
            </div>
        </div>

        <div class="main-content">
            <div class="search-section">
                <h2 class="section-title">
                    <lightning-icon icon-name="utility:search" size="x-small" class="title-icon"></lightning-icon>
                    Search Contact
                </h2>

                <div class="search-box">
                    <input type="text" class="custom-input" placeholder="Search by name, phone or candidate ID"
                        value={searchKeyword} oninput={handleSearchInput} onkeypress={handleSearchKeyPress} />
                    <button class="search-button" onclick={handleSearchClick} disabled={isLoading}>
                        <lightning-icon icon-name="utility:search" size="x-small"></lightning-icon>
                        Search
                    </button>
                </div>
            </div>

            <template if:true={isLoading}>
                <div class="spinner-container">
                    <lightning-spinner size="small" alternative-text="Loading..."></lightning-spinner>
                </div>
            </template>

            <template if:true={showLeadResults}>
                <div class="results-section">
                    <template for:each={groupedLeadItems} for:item="cand">
                        <div key={cand.candidateId} class="lead-wrapper">
                            <div class="lead-info">
                                <div class="lead-name">{cand.candidateName}</div>
                            </div>

                            <template for:each={cand.courses} for:item="lead">
                                <div key={lead.id} class="lead-wrapper">
                                    <div data-id={lead.id} class={lead.cssClass} onclick={selectLead}>
                                        <div class="lead-info">
                                            <div class="lead-details-row">
                                                <span class="lead-detail">
                                                    <lightning-icon icon-name="utility:topic"
                                                        size="xx-small"></lightning-icon>
                                                    {lead.course}
                                                </span>
                                                <span class="lead-detail">
                                                    <lightning-icon icon-name="utility:user"
                                                        size="xx-small"></lightning-icon>
                                                    Owner: {lead.ownerName}
                                                </span>
                                            </div>
                                        </div>
                                    </div>

                                    <template if:true={lead.showTagForm}>
                                        <div class="tag-form-section">
                                            <div class="tag-form-container">
                                                <button class="custom-button primary tag-button-inline"
                                                    onclick={handleTagLead} disabled={isLoading}>
                                                    {tagButtonLabel}
                                                </button>
                                            </div>
                                        </div>
                                    </template>
                                </div>
                            </template>
                        </div>
                    </template>
                </div>
            </template>

            <template if:true={showNotFound}>
                <div class="not-found-section">
                    <lightning-icon icon-name="utility:info" size="medium" class="info-icon"></lightning-icon>
                    <h3 class="not-found-title">No leads found</h3>
                    <p class="not-found-message">
                        We couldn't find any leads matching "{searchKeyword}"
                    </p>
                </div>
            </template>

            <template if:true={showCreateForm}>
                <div class="form-section">
                    <h2 class="section-title">
                        <lightning-icon icon-name="utility:adduser" size="x-small" class="title-icon"></lightning-icon>
                        Create New Lead
                    </h2>

                    <div class="form-container form-grid">
                        <div class="form-field form-field-span-2">
                            <label class="form-label">
                                First Name
                            </label>
                            <input type="text" class="custom-input" placeholder="Enter full name"
                                value={formData.firstName} onchange={handleNameChange} />
                        </div>

                        <div class="form-field form-field-span-2">
                            <label class="form-label">
                                Last Name <span class="required-asterisk">*</span>
                            </label>
                            <input type="text" class="custom-input" placeholder="Enter last name"
                                value={formData.lastName} onchange={handleLastNameChange} />
                        </div>

                        <div class="form-field form-field-span-2">
                            <label class="form-label">
                                Email <span class="required-asterisk">*</span>
                            </label>
                            <input type="email" class="custom-input" placeholder="Enter email address"
                                value={formData.email} onchange={handleEmailChange} />
                        </div>

                        <div class="form-field form-field-span-2">
                            <div class="phone-grid">
                                <div class="form-field">
                                    <label class="form-label">Country Code <span class="required-asterisk">*</span></label>
                                    <select class="custom-input" onchange={handleCountryCodeChange}>
                                        <option value="+91">+91</option>
                                        <option value="+971">+971</option>
                                    </select>
                                </div>

                                <div class="form-field">
                                    <label class="form-label">Phone Number <span class="required-asterisk">*</span></label>
                                    <input type="text" class="custom-input" placeholder="Enter phone number"
                                        value={formData.phone} onchange={handlePhoneChange} />
                                </div>
                            </div>
                        </div>

                        <div class="form-field form-field-span-2">
                            <label class="form-label">
                                Course <span class="required-asterisk">*</span>
                            </label>
                            <select class="custom-input" onchange={handleCourseChange}>
                                <option value="">-- Select Course --</option>
                                <template for:each={courseOptions} for:item="option">
                                    <option key={option.value} value={option.value}>
                                        {option.label}
                                    </option>
                                </template>
                            </select>
                        </div>

                        <div class="form-field form-field-span-2">
                            <label class="form-label">
                                City <span class="required-asterisk">*</span>
                            </label>
                            <select class="custom-input" onchange={handleCityChange}>
                                <option value="">-- Select City --</option>
                                <template for:each={cityOptions} for:item="option">
                                    <option key={option.value} value={option.value}>
                                        {option.label}
                                    </option>
                                </template>
                            </select>
                        </div>

                        <div class="form-field form-field-span-2">
                            <label class="form-label">
                                Source <span class="required-asterisk">*</span>
                            </label>
                            <select class="custom-input" onchange={handleSourceChange}>
                                <option value="">-- Select Source --</option>
                                <template for:each={sourceOptions} for:item="option">
                                    <option key={option.value} value={option.value}>
                                        {option.label}
                                    </option>
                                </template>
                            </select>
                        </div>
                    </div>
                </div>
            </template>
        </div>

        <div class="footer-actions">
            <template if:true={showNotFound}>
                <button class="custom-button primary" onclick={handleCreateNew}>
                    Create New Lead
                </button>
            </template>

            <template if:true={showCreateForm}>
                <button class="custom-button primary" onclick={handleSubmit} disabled={isLoading}>
                    {submitButtonLabel}
                </button>
                <button class="custom-button secondary" onclick={handleCancel} disabled={isLoading}>
                    Cancel
                </button>
            </template>
        </div>
    </div>
</template>

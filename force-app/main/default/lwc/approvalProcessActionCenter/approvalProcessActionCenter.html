<template>
    <!-- Standard-like Approval Banner -->
    <template if:true={showActionButtons}>
        <div class="slds-page-header slds-page-header_record-home slds-m-bottom_medium slds-theme_shade">
            <div class="slds-page-header__row">
                <div class="slds-page-header__col-title">
                    <div class="slds-media">
                        <div class="slds-media__figure">
                            <lightning-icon icon-name="standard:approval" alternative-text="Approval" title="Approval"></lightning-icon>
                        </div>
                        <div class="slds-media__body">
                            <div class="slds-page-header__name">
                                <div class="slds-page-header__name-title">
                                    <h1>
                                        <span class="slds-page-header__title slds-truncate" title="Pending Approval">Pending Approval Request</span>
                                    </h1>
                                </div>
                            </div>
                            <p class="slds-page-header__name-meta">Requires final review and comments by the manager.</p>
                        </div>
                    </div>
                </div>
                <div class="slds-page-header__col-actions">
                    <div class="slds-page-header__controls">
                        <div class="slds-page-header__control">
                            <ul class="slds-button-group-list">
                                <li>
                                    <lightning-button label="Approve" variant="brand" onclick={handleApproveAction}></lightning-button>
                                </li>
                                <li>
                                    <lightning-button label="Reject" variant="neutral" onclick={handleRejectAction} class="slds-m-left_x-small"></lightning-button>
                                </li>
                            </ul>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </template>

    <!-- If it's pending but the user is NOT the approver, show a warning/info box -->
    <template if:true={isPending}>
        <template if:false={isUserApprover}>
            <div class="slds-box slds-theme_warning slds-m-bottom_medium slds-text-align_center">
                <lightning-icon icon-name="utility:info" size="small" class="slds-m-right_x-small" variant="inverse"></lightning-icon>
                <span>This request is pending approval by <strong>{approverName}</strong>.</span>
            </div>
        </template>
    </template>

    <template if:false={isPending}>
        <div class="slds-box slds-theme_shade slds-m-bottom_medium slds-text-align_center">
             <lightning-icon icon-name="utility:lock" size="small" class="slds-m-right_x-small"></lightning-icon>
             <span>Approval Status is currently <strong>{currentStatus}</strong>. No actions available.</span>
        </div>
    </template>

    <!-- Modal for Comments -->
    <template if:true={isModalOpen}>
        <section role="dialog" tabindex="-1" class="slds-modal slds-fade-in-open">
            <div class="slds-modal__container">
                <header class="slds-modal__header">
                    <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse" title="Close" onclick={closeModal}>
                        <lightning-icon icon-name="utility:close" size="small" variant="inverse"></lightning-icon>
                        <span class="slds-assistive-text">Close</span>
                    </button>
                    <h2 class="slds-modal__title slds-hyphenate">{modalTitle}</h2>
                </header>
                <div class="slds-modal__content slds-p-around_medium">
                    <lightning-textarea 
                        label="Final Comments" 
                        placeholder="Please provide justification for your decision..." 
                        required 
                        value={managerComments} 
                        onchange={handleCommentChange}>
                    </lightning-textarea>
                </div>
                <footer class="slds-modal__footer">
                    <lightning-button label="Cancel" variant="neutral" onclick={closeModal} class="slds-m-right_x-small"></lightning-button>
                    <lightning-button label={modalActionLabel} variant="brand" onclick={handleSubmitAction}></lightning-button>
                </footer>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>
</template>

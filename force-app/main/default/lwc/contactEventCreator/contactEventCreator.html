<template>
    <div class="meeting-shell">
        <section class="meeting-card">
            <header class="meeting-header">
                <div class="meeting-header-row">
                    <lightning-icon icon-name="utility:event" size="small" class="header-icon"></lightning-icon>
                    <h1 class="meeting-title">Schedule Meeting</h1>
                </div>
            </header>

            <div class="meeting-body">
                <div class="stepper">
                    <div class={step1Class}>
                        <div class="step-node">1</div>
                        <div class="step-label">Course &amp; Type</div>
                    </div>
                    <div class={stepLine1Class}></div>
                    <div class={step2Class}>
                        <div class="step-node">2</div>
                        <div class="step-label">Schedule</div>
                    </div>
                    <div class={stepLine2Class}></div>
                    <div class={step3Class}>
                        <div class="step-node">3</div>
                        <div class="step-label">Participants</div>
                    </div>
                    <div class={stepLine3Class}></div>
                    <div class={step4Class}>
                        <div class="step-node">4</div>
                        <div class="step-label">Review</div>
                    </div>
                </div>

                <template if:true={isStep1}>
                <section class="section-block">
                    <div class="section-heading">
                        <lightning-icon icon-name="utility:bookmark" size="x-small" class="section-icon"></lightning-icon>
                        <h2>Course &amp; Meeting Details</h2>
                    </div>

                    <div class="field-stack">
                        <label class="field-label">
                            <abbr class="required-mark" title="required">*</abbr>
                            Course
                        </label>
                        <div class="course-chip-row">
                            <template for:each={computedCourseOptions} for:item="course">
                                <button
                                    key={course.value}
                                    type="button"
                                    class={course.cssClass}
                                    data-value={course.value}
                                    onclick={handleCourseOptionClick}
                                >
                                    {course.label}
                                </button>
                            </template>
                        </div>
                        <template if:true={hasSelectedCourses}>
                            <div class="course-pill-container">
                                <template for:each={selectedCourses} for:item="course">
                                    <span key={course} class="course-pill">
                                        <span>{course}</span>
                                        <button type="button" class="course-pill-remove" data-value={course} onclick={handleCoursePillRemove}>x</button>
                                    </span>
                                </template>
                            </div>
                        </template>
                    </div>

                    <div class="details-grid">
                        <div class="field-stack">
                            <lightning-combobox
                                label="Meeting Type"
                                value={meetingType}
                                options={meetingTypeOptions}
                                onchange={handleMeetingTypeChange}
                                required
                                variant="label-stacked"
                                class="custom-combobox">
                            </lightning-combobox>
                        </div>

                        <div class="field-stack">
                            <lightning-combobox
                                label="Purpose"
                                value={typeOfMeeting}
                                options={typeOfMeetingOptions}
                                onchange={handleTypeOfMeetingChange}
                                required
                                variant="label-stacked"
                                class="custom-combobox">
                            </lightning-combobox>
                        </div>
                    </div>

                    <template if:true={showOtherTypeOfMeeting}>
                        <div class="field-stack">
                            <lightning-textarea
                                label="Other Purpose"
                                value={otherTypeOfMeeting}
                                onchange={handleOtherTypeOfMeetingChange}
                                required
                                variant="label-stacked"
                                class="custom-textarea">
                            </lightning-textarea>
                        </div>
                    </template>

                    <div class="field-stack">
                        <lightning-input
                            label="Subject"
                            value={subject}
                            onchange={handleSubjectChange}
                            required
                            variant="label-stacked"
                            class="custom-input">
                        </lightning-input>
                    </div>

                </section>
                </template>

                <template if:true={isStep2}>
                <section class="section-block">
                    <div class="section-heading">
                        <lightning-icon icon-name="utility:clock" size="x-small" class="section-icon"></lightning-icon>
                        <h2>Meeting Time</h2>
                    </div>

                    <div class="schedule-grid">
                        <div class="time-card">
                            <div class="time-card-title">Meeting Duration</div>
                            <lightning-combobox
                                label="Duration"
                                value={duration}
                                options={durationOptions}
                                onchange={handleDurationChange}
                                variant="label-stacked"
                                required
                                disabled
                                class="custom-combobox">
                            </lightning-combobox>
                        </div>

                        <div class="time-card">
                            <div class="time-card-title">Start Date/Time</div>
                            <lightning-input
                                type="datetime"
                                label="Start Date/Time"
                                value={startDateTime}
                                onchange={handleStartDateTimeChange}
                                variant="label-stacked"
                                required
                                class="custom-input">
                            </lightning-input>
                        </div>
                    </div>
                </section>
                </template>

                <template if:true={isStep3}>
                <section class="section-block">
                    <div class="section-heading">
                        <lightning-icon icon-name="utility:people" size="x-small" class="section-icon"></lightning-icon>
                        <h2>Participants</h2>
                    </div>

                    <div class="organizer-banner">
                        <div class="organizer-badge">Organizer</div>
                        <div class="organizer-email">{organizerEmail}</div>
                    </div>

                    <div class="add-participant-card">
                        <div class="subsection-title">Add Participant</div>

                        <div class="participant-add-row">
                            <div class="participant-field">
                                <lightning-combobox
                                    label="Select User"
                                    value={selectedUser}
                                    options={participantOptions}
                                    onchange={handleUserSelection}
                                    variant="label-hidden"
                                    placeholder="Select existing user"
                                    class="custom-combobox">
                                </lightning-combobox>
                            </div>
                            <lightning-button
                                label="Add"
                                onclick={addSelectedUser}
                                variant="brand"
                                class="action-button-primary"
                                disabled={isUserAddDisabled}>
                            </lightning-button>
                        </div>

                        <div class="participant-add-row participant-add-row-secondary">
                            <div class="participant-field">
                                <lightning-input
                                    label="Custom Email"
                                    type="email"
                                    value={customEmail}
                                    onchange={handleCustomEmailChange}
                                    placeholder="Enter custom email address"
                                    variant="label-hidden"
                                    class="custom-input">
                                </lightning-input>
                            </div>
                            <lightning-button
                                label="Add"
                                onclick={addCustomEmail}
                                variant="neutral"
                                class="action-button-secondary"
                                disabled={isEmailAddDisabled}>
                            </lightning-button>
                        </div>
                    </div>

                    <div class="participants-list-card">
                        <div class="participants-list-header">
                            <span>Participants ({participants.length})</span>
                            <template if:true={hasParticipants}>
                                <lightning-button-icon
                                    icon-name="utility:clear"
                                    alternative-text="Clear All"
                                    onclick={clearAllParticipants}
                                    variant="bare"
                                    class="clear-all-btn">
                                </lightning-button-icon>
                            </template>
                        </div>

                        <template if:true={hasParticipants}>
                            <div class="participants-container">
                                <template for:each={displayParticipants} for:item="participant" for:index="index">
                                    <div key={participant.id} class="participant-row">
                                        <div class="participant-avatar">{participant.initials}</div>
                                        <div class="participant-meta">
                                            <div class="participant-name">{participant.name}</div>
                                            <div class="participant-email">{participant.email}</div>
                                        </div>
                                        <template if:true={participant.canRemove}>
                                            <lightning-button-icon
                                                icon-name="utility:close"
                                                alternative-text="Remove"
                                                onclick={removeParticipant}
                                                data-index={index}
                                                variant="bare"
                                                class="remove-btn">
                                            </lightning-button-icon>
                                        </template>
                                    </div>
                                </template>
                            </div>
                        </template>

                        <template if:false={hasParticipants}>
                            <div class="empty-state">No participants added yet</div>
                        </template>
                    </div>
                </section>
                </template>

                <template if:true={isStep4}>
                <section class="section-block review-block">
                    <div class="section-heading">
                        <lightning-icon icon-name="utility:forward_up" size="x-small" class="section-icon"></lightning-icon>
                        <h2>Review &amp; Confirm</h2>
                    </div>

                    <div class="review-list">
                        <div class="review-row">
                            <span>Courses</span>
                            <strong>{selectedCoursesSummary}</strong>
                        </div>
                        <div class="review-row">
                            <span>Meeting Type</span>
                            <strong>{meetingType}</strong>
                        </div>
                        <div class="review-row">
                            <span>Purpose</span>
                            <strong>{typeOfMeeting}</strong>
                        </div>
                        <div class="review-row">
                            <span>Duration</span>
                            <strong>{durationSummary}</strong>
                        </div>
                        <div class="review-row">
                            <span>Start</span>
                            <strong>{formattedStartDateTime}</strong>
                        </div>
                        <div class="review-row">
                            <span>End</span>
                            <strong>{formattedEndDateTime}</strong>
                        </div>
                        <div class="review-row">
                            <span>Participants</span>
                            <strong>{participantNamesSummary}</strong>
                        </div>
                    </div>
                </section>
                </template>

                <div class="action-bar">
                    <lightning-button
                        label="Back"
                        onclick={goToPreviousStep}
                        variant="neutral"
                        disabled={isFirstStep}
                        class="clear-btn">
                    </lightning-button>
                    <template if:false={isLastStep}>
                        <lightning-button
                            label="Continue"
                            onclick={goToNextStep}
                            variant="brand"
                            class="create-btn">
                        </lightning-button>
                    </template>
                    <template if:true={isLastStep}>
                        <lightning-button
                            label="Schedule Meeting"
                            onclick={createMeeting}
                            variant="brand"
                            disabled={isLoading}
                            class="create-btn">
                        </lightning-button>
                    </template>
                </div>

                <template if:true={isLoading}>
                    <div class="loading-overlay">
                        <div class="slds-align_absolute-center loading-content">
                            <lightning-spinner alternative-text="Creating meeting..."></lightning-spinner>
                            <div class="loading-text">Creating Meeting...</div>
                        </div>
                    </div>
                </template>

                <template if:true={showSuccess}>
                    <div class="success-panel">
                        <div class="success-title">Meeting created successfully!</div>
                        <div class="success-links">
                            <a href={meetingResult.htmlLink} target="_blank" class="success-link">
                                View in Calendar
                            </a>
                            <template if:true={meetingResult.meetUrl}>
                                <a href={meetingResult.meetUrl} target="_blank" class="success-link">
                                    Join Google Meet
                                </a>
                            </template>
                        </div>
                    </div>
                </template>
            </div>
        </section>
    </div>
</template>
